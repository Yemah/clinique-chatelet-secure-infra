              type: DEPENDENT
              key: 'oracle.pdb_open_mode["{#CON_ID}"]'
              description: |
                1 - MOUNTED;
                2 - READ WRITE;
                3 - READ ONLY;
                4 - READ ONLY WITH APPLY (a physical standby database is open in real-time query mode).
              valuemap:
                name: 'Oracle DB open status'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$..{#DBNAME}.open_mode.first()'
