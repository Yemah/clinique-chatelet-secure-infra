# OPNsense FW1 — pfctl Ruleset Export (Anonymized)
# Clinique Le Châtelet — Secure Healthcare Infrastructure
# OPNsense 26.1.3 (amd64) / FreeBSD 14.3-RELEASE-p9
# Exported: pfctl -sr | Labels replaced with human-readable descriptions
# IPs: Internal ranges preserved (lab environment), public IPs redacted
#
# Architecture: Cluster HA CARP (FW1 MASTER + FW2 BACKUP)
# Policy: DEFAULT DENY on all interfaces
# Interfaces: WAN (vmx0), Trunk (vmx1), HA_Sync (vmx2), OpenVPN (ovpns2),
#             Tailscale (tailscale0), 6x VLAN sub-interfaces

# ============================================================
# SECTION 1: SCRUB — Fragment reassembly (anti-fragmentation attacks)
# ============================================================
scrub in all fragment reassemble

# ============================================================
# SECTION 2: ANTI-SPOOFING — Block traffic from wrong interfaces
# Prevents a host on VLAN X from spoofing an IP from VLAN Y
# ============================================================
block drop in log on ! vmx2 inet from 10.0.0.0/30 to any               # HA_SYNC subnet only on vmx2
block drop in log on ! ovpns2 inet from 10.100.100.0/24 to any          # OpenVPN subnet only on ovpns2
block drop in log on ! tailscale0 inet from <TAILSCALE_IP> to any       # Tailscale only on tailscale0
block drop in log on ! vlan0.444 inet from 172.16.44.0/24 to any        # BACKUP subnet only on VLAN 444
block drop in log on ! vlan0.222 inet from 172.16.22.0/24 to any        # CLIENT subnet only on VLAN 222
block drop in log on ! vlan0.333 inet from 172.16.33.0/24 to any        # DMZ subnet only on VLAN 333
block drop in log on ! vlan0.555 inet from 172.16.55.0/24 to any        # GUEST subnet only on VLAN 555
block drop in log on ! vlan0.999 inet from 172.16.99.0/24 to any        # MGMT subnet only on VLAN 999
block drop in log on ! vlan0.111 inet from 172.16.11.0/24 to any        # SRV subnet only on VLAN 111
block drop in log on ! vmx0 inet from 192.168.65.0/24 to any            # WAN subnet only on vmx0

# ============================================================
# SECTION 3: DEFAULT DENY — Global catch-all (IPv4 + IPv6)
# ============================================================
block drop in log inet all
block drop in log inet6 all

# ============================================================
# SECTION 4: IPv6 ICMP — Neighbor Discovery Protocol (mandatory)
# ============================================================
# [~40 rules allowing NDP, router solicitation/advertisement, etc.]
# Required for IPv6 stack operation — auto-generated by OPNsense

# ============================================================
# SECTION 5: PORT 0 PROTECTION — Block invalid source/dest port 0
# ============================================================
block drop in log quick inet proto tcp from any port = 0 to any
block drop in log quick inet proto udp from any port = 0 to any
block drop in log quick inet proto tcp from any to any port = 0
block drop in log quick inet proto udp from any to any port = 0

# ============================================================
# SECTION 6: CARP + HA — Allow CARP multicast between firewalls
# ============================================================
pass log quick inet6 proto carp from any to ff02::12 keep state
pass log quick inet proto carp from any to 224.0.0.18 keep state

# ============================================================
# SECTION 7: SECURITY TABLES — Dynamic threat blocking
# ============================================================
block drop in log quick proto tcp from <sshlockout> to (self) port = ssh     # SSH brute-force lockout
block drop in log quick proto tcp from <sshlockout> to (self) port = 4443    # GUI brute-force lockout
block drop in log quick from <virusprot> to any                               # Virus protection table

# ============================================================
# SECTION 8: WAN ANTI-BOGONS — Block RFC1918 + bogons inbound
# ============================================================
block drop in log quick on vmx0 inet from <bogons> to any                    # Bogon list (auto-updated)
block drop in log quick on vmx0 inet6 from <bogonsv6> to any                 # IPv6 bogons
block drop in log quick on vmx0 inet from 10.0.0.0/8 to any                  # RFC1918 Class A
block drop in log quick on vmx0 inet from 172.16.0.0/12 to any               # RFC1918 Class B
block drop in log quick on vmx0 inet from 192.168.0.0/16 to any              # RFC1918 Class C
block drop in log quick on vmx0 inet from 127.0.0.0/8 to any                 # Loopback
block drop in log quick on vmx0 inet from 100.64.0.0/10 to any               # RFC6598 CGN

# ============================================================
# SECTION 9: OUTBOUND — Allow all established outbound traffic
# ============================================================
pass out log all flags S/SA keep state allow-opts

# ============================================================
# SECTION 10: TRUNK MANAGEMENT — SSH + Web GUI access via trunk
# ============================================================
pass in log quick on vmx1 proto tcp from any to (self) port = ssh flags S/SA keep state
pass in log quick on vmx1 proto tcp from any to (self) port = http flags S/SA keep state
pass in log quick on vmx1 proto tcp from any to (self) port = 4443 flags S/SA keep state

# ============================================================
# SECTION 11: WAN INBOUND — Exposed services (3 rules only)
# ============================================================
pass in log quick on vmx0 reply-to (vmx0 <WAN_GW>) inet proto tcp from any to (vmx0) port = http flags S/SA keep state
pass in log quick on vmx0 reply-to (vmx0 <WAN_GW>) inet proto tcp from any to (vmx0) port = https flags S/SA keep state
pass in log quick on vmx0 reply-to (vmx0 <WAN_GW>) inet proto tcp from any to (vmx0) port = openvpn flags S/SA keep state
pass in log quick on vmx0 reply-to (vmx0 <WAN_GW>) inet proto udp from any to (vmx0) port = openvpn keep state

# ============================================================
# SECTION 12: HA_SYNC — Allow all traffic on pfSync link
# ============================================================
pass in quick on vmx2 inet all flags S/SA keep state

# ============================================================
# SECTION 13: VLAN 111 (SRV) — Server zone rules
# 20 pass rules + 2 block rules
# ============================================================
# NTP outbound: Oracle, AD, Monitoring → any NTP
pass in quick on vlan0.111 inet proto udp from <HOST_ORACLE> to any port = ntp keep state
pass in quick on vlan0.111 inet proto udp from <AD_SERVERs> to any port = ntp keep state
pass in quick on vlan0.111 inet proto udp from <MONITORING_SERVERS> to any port = ntp keep state

# AD DNS + HTTP/S outbound (updates)
pass in quick on vlan0.111 inet proto tcp from <AD_SERVERs> to any port = http flags S/SA keep state
pass in quick on vlan0.111 inet proto tcp from <AD_SERVERs> to any port = https flags S/SA keep state
pass in quick on vlan0.111 inet proto tcp from <AD_SERVERs> to any port = domain flags S/SA keep state
pass in quick on vlan0.111 inet proto udp from <AD_SERVERs> to any port = domain keep state

# Zabbix cross-VLAN ICMP monitoring
pass in quick on vlan0.111 inet proto icmp from <MONITORING_SERVERS> to <NET_SRV> keep state
pass in quick on vlan0.111 inet proto icmp from <MONITORING_SERVERS> to <NET_DMZ> keep state
pass in quick on vlan0.111 inet proto icmp from <MONITORING_SERVERS> to <NET_CLIENT> keep state
pass in quick on vlan0.111 inet proto icmp from <MONITORING_SERVERS> to <NET_BACKUP> keep state
pass in quick on vlan0.111 inet proto icmp from <MONITORING_SERVERS> to (self) keep state

# Monitoring HTTP/S outbound (updates)
pass in quick on vlan0.111 inet proto tcp from <MONITORING_SERVERS> to any port = http flags S/SA keep state
pass in quick on vlan0.111 inet proto tcp from <MONITORING_SERVERS> to any port = https flags S/SA keep state

# Oracle + GLPI HTTP/S outbound
pass in quick on vlan0.111 inet proto tcp from <HOST_ORACLE> to any port { http, https } flags S/SA keep state
pass in quick on vlan0.111 inet proto tcp from <HOST_GLPI> to any port { http, https } flags S/SA keep state

# Mailpit email relay (monitoring alerts + GLPI notifications)
pass in quick on vlan0.111 inet proto tcp from <MONITORING_SERVERS> to <MAILPIT_SERVER> port { 1025, 8025 } flags S/SA keep state
pass in quick on vlan0.111 inet proto tcp from <HOST_GLPI> to <MAILPIT_SERVER> port { 1025, 8025 } flags S/SA keep state

# Wazuh agent registration + communication (SRV → Wazuh manager)
pass in quick on vlan0.111 inet proto tcp from <NET_SRV> to <MONITORING_SERVERS> port { 1514, 1515 } flags S/SA keep state

# Zabbix SNMP + Agent polling to firewall (self)
pass in quick on vlan0.111 inet proto tcp from <MONITORING_SERVERS> to (self) port = zabbix-agent flags S/SA keep state
pass in quick on vlan0.111 inet proto icmp from <MONITORING_SERVERS> to (self) keep state
pass in quick on vlan0.111 inet proto udp from <MONITORING_SERVERS> to (self) port { snmp, syslog } keep state

# Zabbix passive agent polling (SRV → all VLANs targets)
pass in quick on vlan0.111 inet proto tcp from <MONITORING_SERVERS> to <NET_SRV> port = zabbix-agent flags S/SA keep state
pass in quick on vlan0.111 inet proto tcp from <MONITORING_SERVERS> to <NET_DMZ> port = zabbix-agent flags S/SA keep state
pass in quick on vlan0.111 inet proto tcp from <MONITORING_SERVERS> to <NET_CLIENT> port = zabbix-agent flags S/SA keep state
pass in quick on vlan0.111 inet proto tcp from <MONITORING_SERVERS> to <NET_BACKUP> port = zabbix-agent flags S/SA keep state

# BLOCK: SRV → any other internal VLAN (catch unauthorized lateral movement)
block drop in log quick on vlan0.111 inet from <NET_SRV> to <PRIVATE_NETWORK>
# DEFAULT DENY: Catch-all for VLAN 111
block drop in log quick on vlan0.111 inet all

# ============================================================
# SECTION 14: VLAN 222 (CLIENT) — Workstation zone rules
# ============================================================
# AD services: DNS, Kerberos (88), LDAP (389/636), SMB (445), RPC (135, 49152-65535), GC (3268/3269)
pass in quick on vlan0.222 inet proto tcp from <NET_CLIENT> to <AD_SERVERs> port { domain, kerberos-sec, epmap, ldap, microsoft-ds, kpasswd, ldaps, 3268, 3269, 49152:65535 } flags S/SA keep state
pass in quick on vlan0.222 inet proto udp from <NET_CLIENT> to <AD_SERVERs> port { domain, kerberos-sec, epmap, ldap, microsoft-ds, kpasswd, ldaps, 3268, 3269, 49152:65535 } keep state

# NTP sync with AD
pass in quick on vlan0.222 inet proto udp from <NET_CLIENT> to <AD_SERVERs> port = ntp keep state

# Web access to DMZ portal (via Authelia MFA)
pass in quick on vlan0.222 inet proto tcp from <NET_CLIENT> to <HOST_PROXY> port { http, https } flags S/SA keep state
pass in quick on vlan0.222 inet proto tcp from <NET_CLIENT> to <HOST_WEBAPP> port { http, https } flags S/SA keep state

# SIEM + Monitoring agent communication
pass in quick on vlan0.222 inet proto tcp from <NET_CLIENT> to <MONITORING_SERVERS> port { 1514, 1515 } flags S/SA keep state
pass in quick on vlan0.222 inet proto tcp from <NET_CLIENT> to <MONITORING_SERVERS> port = zabbix-trapper flags S/SA keep state

# Internet access (Windows Update)
pass in quick on vlan0.222 inet proto tcp from <NET_CLIENT> to any port { http, https } flags S/SA keep state

# BLOCK: CLIENT → SRV (no direct server access)
block drop in log quick on vlan0.222 inet from <NET_CLIENT> to <NET_SRV>
# BLOCK: CLIENT → BACKUP (isolation of backup zone)
block drop in log quick on vlan0.222 inet from <NET_CLIENT> to <NET_BACKUP>
# DEFAULT DENY
block drop in log quick on vlan0.222 inet all

# ============================================================
# SECTION 15: VLAN 333 (DMZ) — Demilitarized zone rules
# ============================================================
# Authelia → AD LDAPS authentication
pass in log quick on vlan0.333 inet proto tcp from <HOST_PROXY> to <AD_SERVERs> port = ldaps flags S/SA keep state

# DNS resolution for DMZ services
pass in quick on vlan0.333 inet proto tcp from <HOST_PROXY> to <AD_SERVERs> port = domain flags S/SA keep state
pass in quick on vlan0.333 inet proto udp from <HOST_PROXY> to <AD_SERVERs> port = domain keep state
pass in quick on vlan0.333 inet proto tcp from <HOST_WEBAPP> to <AD_SERVERs> port = domain flags S/SA keep state
pass in quick on vlan0.333 inet proto udp from <HOST_WEBAPP> to <AD_SERVERs> port = domain keep state

# NTP sync
pass in quick on vlan0.333 inet proto udp from <NET_DMZ> to <AD_SERVERs> port = ntp keep state

# Reverse proxy → Web application (internal HTTP 8080)
pass in quick on vlan0.333 inet proto tcp from <HOST_PROXY> to <HOST_WEBAPP> port = http-alt flags S/SA keep state

# Web app → Oracle DB (port 1521) — THE critical HDS data flow
pass in quick on vlan0.333 inet proto tcp from <HOST_WEBAPP> to <HOST_ORACLE> port = 1521 flags S/SA keep state

# DMZ internet access (updates only)
pass in quick on vlan0.333 inet proto tcp from <NET_DMZ> to any port { http, https } flags S/SA keep state

# Wazuh + Zabbix agents
pass in quick on vlan0.333 inet proto tcp from <NET_DMZ> to <MONITORING_SERVERS> port { 1514, 1515 } flags S/SA keep state
pass in quick on vlan0.333 inet proto tcp from <NET_DMZ> to <MONITORING_SERVERS> port = zabbix-trapper flags S/SA keep state

# BLOCK: DMZ → any internal network (critical isolation)
block drop in log quick on vlan0.333 inet from <NET_DMZ> to <PRIVATE_NETWORK>
# DEFAULT DENY
block drop in log quick on vlan0.333 inet all

# ============================================================
# SECTION 16: VLAN 444 (BACKUP) — Sanctuarized backup zone
# ============================================================
# Veeam → backup targets (RPC, SMB, VDDK, Veeam ports)
pass in quick on vlan0.444 inet proto tcp from <HOST_VEEAM> to <VEEAM_BACKUP_TARGETs> port { epmap, microsoft-ds, 902, 2500:3300, 6160:6161, 9392 } flags S/SA keep state

# Veeam internet (updates) + DNS + NTP via AD
pass in quick on vlan0.444 inet proto tcp from <HOST_VEEAM> to any port { http, https } flags S/SA keep state
pass in quick on vlan0.444 inet proto udp from <HOST_VEEAM> to <AD_SERVERs> port = ntp keep state
pass in quick on vlan0.444 inet proto tcp from <HOST_VEEAM> to <AD_SERVERs> port = domain flags S/SA keep state
pass in quick on vlan0.444 inet proto udp from <HOST_VEEAM> to <AD_SERVERs> port = domain keep state

# Wazuh + Zabbix agents
pass in quick on vlan0.444 inet proto tcp from <NET_BACKUP> to <MONITORING_SERVERS> port { 1514, 1515 } flags S/SA keep state
pass in quick on vlan0.444 inet proto tcp from <NET_BACKUP> to <MONITORING_SERVERS> port = zabbix-trapper flags S/SA keep state

# BLOCK: BACKUP → CLIENT (isolation)
block drop in log quick on vlan0.444 inet from <NET_BACKUP> to <NET_CLIENT>
# BLOCK: BACKUP → DMZ (isolation)
block drop in log quick on vlan0.444 inet from <NET_BACKUP> to <NET_DMZ>
# DEFAULT DENY
block drop in log quick on vlan0.444 inet all

# ============================================================
# SECTION 17: VLAN 555 (GUEST) — Patient network (maximum isolation)
# ============================================================
# BLOCK FIRST: No access to any internal network
block drop in log quick on vlan0.555 inet from <NET_GUEST> to <PRIVATE_NETWORK>
# DNS (public resolvers only after DHCP fix)
pass in quick on vlan0.555 inet proto udp from <NET_GUEST> to any port = domain keep state
# Internet browsing only
pass in quick on vlan0.555 inet proto tcp from <NET_GUEST> to any port { http, https } flags S/SA keep state
# DEFAULT DENY
block drop in log quick on vlan0.555 inet all

# ============================================================
# SECTION 18: VPN TUNNELS — Full access for authenticated users
# ============================================================
# OpenVPN (post-MFA authentication via TOTP)
pass in log quick on ovpns2 inet from (ovpns2:network) to any flags S/SA keep state
# Tailscale (remote management overlay)
pass in log quick on tailscale0 inet all flags S/SA keep state

# ============================================================
# SECTION 19: VLAN 999 (MGMT) — Admin bastion zone
# ============================================================
# Full access to all internal VLANs (admin privilege)
pass in quick on vlan0.999 inet from (vlan0.999:network) to <PRIVATE_NETWORK> flags S/SA keep state
# OPNsense GUI access
pass in quick on vlan0.999 inet proto tcp from <PC_ADMIN_IT> to (self) port = 4443 flags S/SA keep state
# Mailpit web interface (alert monitoring)
pass in quick on vlan0.999 inet proto tcp from <PC_ADMIN_IT> to <MAILPIT_SERVER> port { 1025, 8025 } flags S/SA keep state
# DEFAULT DENY (catch anything not from MGMT subnet)
block drop in log quick on vlan0.999 inet all
