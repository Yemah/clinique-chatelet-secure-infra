site_name: Clinique Le Châtelet — Infrastructure Sécurisée
site_description: Documentation technique d'une infrastructure de soins sécurisée (HDS/HIPAA) déployée sur VMware ESXi
site_author: Yemah
site_url: https://yemah.github.io/clinique-chatelet-secure-infra/

repo_name: Yemah/clinique-chatelet-secure-infra
repo_url: https://github.com/Yemah/clinique-chatelet-secure-infra

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Mode clair
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/shield-lock
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

nav:
  - Accueil: index.md
  - Architecture:
    - Vue d'ensemble: architecture/overview.md
    - Matrice de flux: architecture/flux-matrix.md
  - Sécurité Réseau:
    - Pare-feu HA (OPNsense): security/firewall.md
    - SIEM Wazuh: security/wazuh.md
    - Supervision Zabbix: security/zabbix.md
  - Infrastructure:
    - Active Directory: infra/active-directory.md
    - DMZ & MFA Authelia: infra/dmz-authelia.md
    - Oracle & Portail: infra/oracle-portal.md
    - Backup & PRA: infra/veeam-pra.md
  - Pentest: pentest/results.md
  - Conformité: compliance/overview.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search:
      lang: fr

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Yemah
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/steeve-womo
