            key: 'oracle.sga.stats["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}"]'
          tags:
            - tag: component
              value: memory
            - tag: component
              value: sga
        - uuid: 517c7b3bbf8d40988e6a8289319eaec9
          name: 'Shared pool free %'
          type: DEPENDENT
          key: oracle.shared_pool_free
          value_type: FLOAT
          units: '%'
