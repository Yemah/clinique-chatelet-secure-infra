# OPNsense FW1 — NAT Rules (Anonymized)
# Command: pfctl -sn

# CARP exemption — do not NAT CARP multicast traffic
no nat proto carp all

# ISAKMP static-port NAT — preserve source port for IPsec compatibility
# Applied to all internal networks + VPN tunnels
nat on vmx0 inet from (vmx2:network) to any port = isakmp -> (vmx0:0) static-port      # HA_SYNC
nat on vmx0 inet from (ovpns2:network) to any port = isakmp -> (vmx0:0) static-port     # OpenVPN
nat on vmx0 inet from (tailscale0:network) to any port = isakmp -> (vmx0:0) static-port # Tailscale
nat on vmx0 inet from (vlan0.111:network) to any port = isakmp -> (vmx0:0) static-port  # SRV
nat on vmx0 inet from (vlan0.222:network) to any port = isakmp -> (vmx0:0) static-port  # CLIENT
nat on vmx0 inet from (vlan0.333:network) to any port = isakmp -> (vmx0:0) static-port  # DMZ
nat on vmx0 inet from (vlan0.444:network) to any port = isakmp -> (vmx0:0) static-port  # BACKUP
nat on vmx0 inet from (vlan0.555:network) to any port = isakmp -> (vmx0:0) static-port  # GUEST
nat on vmx0 inet from (vlan0.999:network) to any port = isakmp -> (vmx0:0) static-port  # MGMT

# Standard outbound NAT — all internal → WAN (port range 1024-65535)
nat on vmx0 inet from (vmx2:network) to any -> (vmx0:0) port 1024:65535
nat on vmx0 inet from (ovpns2:network) to any -> (vmx0:0) port 1024:65535
nat on vmx0 inet from (tailscale0:network) to any -> (vmx0:0) port 1024:65535
nat on vmx0 inet from (vlan0.111:network) to any -> (vmx0:0) port 1024:65535
nat on vmx0 inet from (vlan0.222:network) to any -> (vmx0:0) port 1024:65535
nat on vmx0 inet from (vlan0.333:network) to any -> (vmx0:0) port 1024:65535
nat on vmx0 inet from (vlan0.444:network) to any -> (vmx0:0) port 1024:65535
nat on vmx0 inet from (vlan0.555:network) to any -> (vmx0:0) port 1024:65535
nat on vmx0 inet from (vlan0.999:network) to any -> (vmx0:0) port 1024:65535

# Zabbix agent NAT anchor (dynamic rules)
nat-anchor "zabbix-agent/*" all

# CARP exemption for inbound redirects
no rdr proto carp all

# Protect trunk management ports from redirection
no rdr on vmx1 proto tcp from any to (vmx1) port = ssh
no rdr on vmx1 proto tcp from any to (vmx1) port = http
no rdr on vmx1 proto tcp from any to (vmx1) port = 4443
