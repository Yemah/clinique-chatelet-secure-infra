###############################################################################
# Authelia Configuration - Version corrigée pour Clinique Châtelet
###############################################################################
certificates_directory: '/etc/authelia/certificates/'

server:
  address: 'tcp://127.0.0.1:9091/authelia'

log:
  level: debug
  file_path: '/var/log/authelia/authelia.log'

totp:
  disable: false
  issuer: 'Clinique Le Chatelet'
  algorithm: sha1
  digits: 6
  period: 30

access_control:
  default_policy: deny
  rules:
    # 2. On bloque ABSOLUMENT tout le reste en exigeant la 2FA
    - domain: 'portal.clinique-chatelet.local'
      policy: two_factor

      #subject:
       # - 'group:GS_Medecins'
       # - 'group:GS_Soignants'
       # - 'group:GS_Administratifs'
       # - 'group:GS_IDE'
       # - 'group:GS_IT'
       # - 'group:GS_Aides-Soignants'

session:
  secret: 'file:///etc/authelia/secrets/session_secret'
  cookies:
    - domain: 'clinique-chatelet.local'
      authelia_url: 'https://portal.clinique-chatelet.local/authelia'
      name: 'authelia_session'
      expiration: 8h
      inactivity: 1h
      remember_me: 1M
      default_redirection_url: 'https://portal.clinique-chatelet.local/'

storage:
  encryption_key: 'file:///etc/authelia/secrets/encryption_key'
  local:
    path: '/var/lib/authelia/db.sqlite3'

notifier:
  smtp:
    address: 'smtp://127.0.0.1:1025'
    sender: 'Authelia <noreply@clinique-chatelet.local>'
    subject: '[Clinique Le Châtelet] {title}'
    disable_require_tls: true

# Ajout obligatoire pour la v4.38+ (utilisation du fichier jwt_secret existant)
identity_validation:
  reset_password:
    jwt_secret: 'file:///etc/authelia/secrets/jwt_secret'

authentication_backend:
  ldap:
    implementation: activedirectory
    address: 'ldaps://ldap.clinique-chatelet.local:636'
    timeout: 5s
    start_tls: false
    tls:
      skip_verify: false
      minimum_version: TLS1.2
    base_dn: 'DC=clinique-chatelet,DC=local'
    user: 'CN=svc_authelia,OU=CLINIQUE_SERVICE_ACCOUNTS,DC=clinique-chatelet,DC=local'

    # Filtres corrigés
    users_filter: '(&({username_attribute}={input})(objectClass=user)(!(userAccountControl:1.2.840.113556.1.4.803:=2)))'
    groups_filter: '(&(objectClass=group)(member={dn}))'

    attributes:
      username: sAMAccountName
      mail: mail
      display_name: displayName
      group_name: cn